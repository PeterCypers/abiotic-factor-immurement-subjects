<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immurement-Subjects</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="shortcut icon" href="img/Icon_slowhealer_rounded.png" type="image/x-icon">
</head>
<body>
  <main>
    <h1>Abiotic Factor IS-lookup</h1>

    <div id="filter-extras-container">
      <div id="filter-container">
        <label for="is-filter">Filter:</label>
        <input type="text" name="is-filter" id="is-filter">
        <button id="resetfilterbtn">Reset</button><br>
        <small><i>(Filter IS by number or name)</i></small>
      </div>
      <div id="infoPageBtnContainer">
        <button id="infoPageBtn">
          Info Page
          <i class="fa-solid fa-biohazard"></i>
        </button>
      </div>
    </div>


    <div id="cards-container">
      <!-- Cards generated here -->
    </div>
  </main>

  <script src="//unpkg.com/alpinejs" defer></script>
  <script src="js/main.js"></script>
</body>
</html>
